    <script>
        var User_Id = 0;
        function ShowAutoLogin(Username, Delay) {
            var DelayTimer = Delay;
            DSConfirm({
                text: "ورود خودکار با نام کاربری '" +
                        Username + "'<br/><span id='DelayTimer'>" +
                        (Math.round(10 * DelayTimer - 1) / 10) + "</span> ثانیه",
                callback: function (res) {
                    clearInterval(AutoLoginTimeoutId);
                    if (res)
                        DoAjax('', 'commonpages/DSUserProcessLogind41d.php?', '&act=AutoLogin', DoAfterAjax);
                },
                ok: "ورود سریع",
                cancel: "لغو",
                close:true,
                title:"ورود خودکار"
            });

            AutoLoginTimeoutId = setInterval(function () {
                DelayTimer = Math.round(10 * DelayTimer - 1) / 10;
                document.getElementById("DelayTimer").innerHTML = DelayTimer;
                if (DelayTimer <= 0)
                    callbacktop(true);
            }, 100);
        }

        function DoAfterAjax(Res) {
            if (Res == '')
                DSAlert({text: "Empty response", type: "alert-error"});
            else if (Res[0] == '~')
                DSAlert({text: Res.substring(1), type: "alert-error"});
            else {
                var ResArray = Res.split("~");
                if (ResArray[0] != "OK") {
                    DSAlert({text: Res, type: "alert-error"});
                } else {
                    User_Id = ResArray[1];
                    SetIFrame('DS_MyInternet.html', '');
                    DSProgressOn();
                }
            }
        }

        function SetIFrame(url, param) {
            document.getElementById("MainBox").src = "computer/" + url + "?&WebNewUser=No&NCR=No&Feedback=No" + param + "&User_Id=" + User_Id+"&Device=computer";
        }
        function DoOnload() {
            //window.onbeforeunload = function(){return "Refreshing this page can result in data loss."}
            DoOnResize();


            SetIFrame('DS_Home.html', '');
        }

        function DoOnResize() {
            document.getElementById('MainBox').style.height = $(window).height() + "px";
        }
    </script>
    <body onload=DoOnload() onresize=DoOnResize() style="overflow:hidden;">
        <iframe frameborder="0" style="width:100%;height:100%" height="100%" id="MainBox"></iframe>
